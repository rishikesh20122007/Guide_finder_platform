<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guide Finder</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background-color: #f5f7fa;
}

body {
  background-image: url('./mesut-kaya-eOcyhe5-9sQ-unsplash (1).jpg');
  background-size: cover; /* Ensures the image covers the whole screen */
  background-position: center;
  background-repeat: repeat;
  height: 100vh;
}


.guide-card {
    border: 2px solid #313131;
    border-radius: 50px;
    overflow:auto;
    transition: 0.5s;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

.guide-card:hover {
    transform: translateY(-15px);
}

.guide-card img {
    height: 220px;
    object-fit:fill;
}

.btn-view {
    background: #018bfd;
    color: white;
}
</style>
</head>

<body>

    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">GuideFinder</a>
        </div>
    </nav>
    <div class="container py-5">
    <h2 class="text-center mb-5">🌍 Available Local Guides</h2>
    <div class="row g-4" id="guideContainer"></div>
    </div>
    <script src="script.js"></script>


    <!-- Booking Popup -->


<div id="bookingForm" style="
  display:none;
  position:fixed;
    top:50%;
    left:50%;
    transform: translate(-50%, -50%);
  background:white;
  padding:20px;
  border-radius:10px;
  box-shadow:0 0 10px gray;
  z-index:1000;
">
  <h3 id="guideTitle">Book Guide</h3>

  <input type="text" id="userName" class="form-control mb-2" placeholder="Your Name">
  <input type="date" id="date" class="form-control mb-2">

  <select id="time" class="form-control mb-2">
    <option value="">Select Time</option>
    <option>10:00</option>
    <option>11:00</option>
    <option>12:00</option>
  </select>

  <button class="btn btn-success w-100 mb-2" onclick="submitBooking()">Confirm Booking</button>
  <button class="btn btn-danger w-100" onclick="closeForm()">Cancel</button>
</div>

<script>
let selectedGuide = "";

function bookGuide(name) {
  selectedGuide = name;
  document.getElementById("guideTitle").innerText = "Book " + name;
  document.getElementById("bookingForm").style.display = "block";
  document.body.style.overflow = "hidden";
}

function closeForm() {
  document.getElementById("bookingForm").style.display = "none";
  document.body.style.overflow = "auto";
}

async function submitBooking() {
  const user = document.getElementById("userName").value;
  const date = document.getElementById("date").value;
  const time = document.getElementById("time").value;

  if (!user || !date || !time) {
    alert("❌ Please fill all fields");
    return;
  }

  const data = {
    guide: selectedGuide,
    user,
    date,
    time
  };

  try {
    const res = await fetch("http://localhost:5000/book", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });

    const result = await res.json();
    alert(result.message || "✅ Booking successful");

    closeForm();
  } catch (error) {
    alert("❌ Server error");
  }
}
</script>


   
</body>
</html>
