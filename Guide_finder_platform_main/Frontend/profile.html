<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Guide Profile</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
.profile-card {
    border-radius: 20px;
    padding: 30px;
    background: white;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

.profile-img {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    border: 4px solid #0d6efd;
}

.phase-box {
    background: #f1f1f1;
    padding: 10px 20px;
    border-radius: 10px;
}
</style>
</head>

<body style="background:#eef2f7;">

    <div class="container py-5">
        <div class="profile-card text-center">
            <h2>Guide Journey</h2>
            <img id="guideImg" class="profile-img my-3">
            <h4 id="guideName" class="text-primary"></h4>
            <div class="mt-4">
            <h5>Phases</h5>
            <div class="d-flex justify-content-center gap-3 flex-wrap">
            <span class="phase-box">Register</span>
            <span class="phase-box">Availability</span>
            <span class="phase-box">Booking</span>
            <span class="phase-box">On Tour</span>
         </div>
         </div>
    <div class="mt-4">
        <h5>Details</h5>
        <p id="guideDetails"></p>
    </div>
         <button class="btn btn-success mt-4">Book Guide</button>
    </div>
    </div>
    <script src="profile.js"></script>

</body>
</html>
