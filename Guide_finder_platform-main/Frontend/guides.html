<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guide Finder</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background-color: #f5f7fa;
}

body {
  background-image: url('./mesut-kaya-eOcyhe5-9sQ-unsplash (1).jpg');
  background-size: cover; /* Ensures the image covers the whole screen */
  background-position: center;
  background-repeat: repeat;
  height: 100vh;
}


.guide-card {
    border: 2px solid #313131;
    border-radius: 50px;
    overflow:auto;
    transition: 0.5s;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

.guide-card:hover {
    transform: translateY(-15px);
}

.guide-card img {
    height: 220px;
    object-fit:fill;
}

.btn-view {
    background: #018bfd;
    color: white;
}
</style>
</head>

<body>

    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">GuideFinder</a>
        </div>
    </nav>
    <div class="container py-5">
    <h2 class="text-center mb-5">🌍 Available Local Guides</h2>
    <div class="row g-4" id="guideContainer"></div>
    </div>
    <script src="script.js"></script>

</body>
</html>
